modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      copr:
        - atim/starship
        - lihaohong/yazi
    install:
      packages:
        - android-tools
        - bat
        - btrfs-assistant
        - duf
        - gdu
        - imv
        - meson
        - micro
        - realtime-setup
        - starship
        - yazi

  - type: default-flatpaks
    configurations:
      - scope: user
        install: 
          - com.github.wwmm.easyeffects
          - org.equicord.equibop
          - org.fedoraproject.MediaWriter
          - com.vysp3r.ProtonPlus
          - com.github.Matoking.protontricks
          - com.valvesoftware.Steam

  - type: brew
    nofile-limits: true
    brew-analytics: false

  - type: systemd
    system:
      enabled:
        - storage-setup.service

  - type: script
    snippets:
      - "chmod -R +x /usr/libexec/dank-bluebuild/post-login-setup/script.d"
      - "chmod -R +x /usr/libexec/personal-dank-bluebuild"
