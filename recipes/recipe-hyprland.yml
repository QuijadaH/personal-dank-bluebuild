---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: dank-blue-build-hyprland-personal
description: This is my personal OS image.

base-image: ghcr.io/quijadah/dank-blue-build-hyprland
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /
        
  - type: dnf
    repos:
      copr:
        - atim/starship
        - lihaohong/yazi
    install:
      packages:
        - android-tools
        - bat
        - btrfs-assistant
        - duf
        - gdu
        - imv
        - micro
        - realtime-setup   # `sudo usermod -a -G realtime $(whoami)`
        - starship
        - yazi

  - from-file: ./development-modules.yml
  
  - type: brew
    nofile-limits: true
    brew-analytics: false

  - type: signing
