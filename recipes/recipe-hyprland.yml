---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: dank-blue-build-hyprland-personal
description: This is my personal OS image.

base-image: ghcr.io/quijadah/dank-blue-build-hyprland
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  - from-file: ./common/extra-modules.yml
  - from-file: ./common/development-modules.yml
  
  - type: brew
    nofile-limits: true
    brew-analytics: false

  # - type: script
  #   snippets:
  #     - "echo 'source = ./user/scrolling_layout.conf' >> /etc/skel/.config/hypr/hyprland.conf"

  - type: signing
