modules:
  - type: dnf
    repos:
      files:
        - https://packages.microsoft.com/yumrepos/vscode/config.repo
    install:
      packages:
        - code
        - podman-compose
        - podman-tui
        - podlet
        - containers-common-extra
  
  - type: systemd
    user:
      enabled:
        - podman.socket    # Verify with `ls -la /run/user/$(id -u)/podman/podman.sock`
